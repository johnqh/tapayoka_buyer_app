<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://firebaseinstallations.googleapis.com" />

    <!-- Primary Meta Tags -->
    <title>{{VITE_APP_NAME}} - Smart Vending & Mobile Ordering</title>
    <meta
      name="description"
      content="{{VITE_APP_NAME}} makes contactless payments and mobile ordering from vending machines effortless. Browse products, pay from your phone, and skip the line."
    />
    <meta
      name="keywords"
      content="vending machine, contactless payment, mobile ordering, food ordering, snack machine, {{VITE_APP_NAME}}"
    />
    <meta name="author" content="{{VITE_COMPANY_NAME}}" />
    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#f59e0b" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="{{VITE_APP_NAME}} - Smart Vending & Mobile Ordering"
    />
    <meta
      property="og:description"
      content="{{VITE_APP_NAME}} makes contactless payments and mobile ordering from vending machines effortless. Browse products, pay from your phone, and skip the line."
    />
    <meta property="og:url" content="https://{{VITE_APP_DOMAIN}}/" />
    <meta property="og:site_name" content="{{VITE_APP_NAME}}" />
    <meta property="og:image" content="https://{{VITE_APP_DOMAIN}}/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="{{VITE_APP_NAME}} - Smart Vending & Mobile Ordering"
    />
    <meta
      name="twitter:description"
      content="{{VITE_APP_NAME}} makes contactless payments and mobile ordering from vending machines effortless. Browse products, pay from your phone, and skip the line."
    />
    <meta name="twitter:image" content="https://{{VITE_APP_DOMAIN}}/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://{{VITE_APP_DOMAIN}}/" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "{{VITE_APP_NAME}}",
        "description": "{{VITE_APP_NAME}} makes contactless payments and mobile ordering from vending machines effortless. Browse products, pay from your phone, and skip the line.",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Mobile Commerce",
        "operatingSystem": "iOS, Android",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "{{VITE_COMPANY_NAME}}"
        }
      }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "{{VITE_COMPANY_NAME}}",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "logo": "https://{{VITE_APP_DOMAIN}}/logo.png",
        "sameAs": []
      }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{VITE_APP_NAME}}",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "inLanguage": ["en"],
        "publisher": {
          "@type": "Organization",
          "name": "{{VITE_COMPANY_NAME}}"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
